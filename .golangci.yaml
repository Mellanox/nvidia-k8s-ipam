version: "2"

run:
  modules-download-mode: readonly
  tests: false

linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - decorder
    - dogsled
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - forbidigo
    - forcetypeassert
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - goheader
    - gomodguard
    - goprintffuncname
    - gosec
    - govet
    - grouper
    - importas
    - ineffassign
    - interfacebloat
    - lll
    - loggercheck
    - maintidx
    - makezero
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - staticcheck
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    dupl:
      threshold: 100
    funlen:
      lines: 120
      statements: 55
    goconst:
      min-len: 2
      min-occurrences: 2
    gocyclo:
      min-complexity: 30
    lll:
      line-length: 120
    misspell:
      locale: US
    revive:
      rules:
        - name: unused-parameter
          disabled: true
    gocritic:
      disabled-checks:
        - appendAssign
  exclusions:
    generated: lax

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/Mellanox/nvidia-k8s-ipam
  exclusions:
    generated: lax
